<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Télécommande de Contrôle</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #121212; color: white; padding: 20px; }
  .panel { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
  h3 { margin-top: 0; color: #00c853; }
  input, select, button { padding: 8px; border-radius: 5px; border: none; margin: 4px; font-weight: bold; }
  button { background: #00c853; color: white; cursor: pointer; }
  button.stop { background: #d50000; }
</style>
</head>
<body>

<h2>🎛️ Tableau de bord TikFinity-Maison</h2>

<div class="panel">
  <h3>Gestion du temps</h3>
  <input type="number" id="startHours" placeholder="HH" style="width:50px;">
  <input type="number" id="startMinutes" placeholder="MM" style="width:50px;">
  <input type="number" id="startSeconds" placeholder="SS" style="width:50px;">
  <button onclick="sendAction('set_time')">Appliquer le temps</button>
</div>

<div class="panel">
  <h3>Configuration des Pièces</h3>
  <span>1 pièce = </span>
  <input type="number" id="coinValue" value="5" style="width:60px;"> secondes
  <button onclick="sendAction('update_info')">Changer le texte d'info</button>
</div>

<div class="panel">
  <h3>Ajout manuel</h3>
  <input type="number" id="coins" placeholder="Nombre de pièces" style="width:120px;">
  <button onclick="sendAction('add_coins')">+</button>
  <button class="stop" onclick="sendAction('remove_coins')">-</button>
</div>

<div class="panel">
  <h3>Personnalisation Visuelle</h3>
  <label>Couleur Timer :</label> <input type="color" id="timerColor" value="#ffffff" oninput="sendStyles()"><br>
  <label>Effet Néon :</label> <input type="color" id="timerEffect" value="#00ffff" oninput="sendStyles()"><br>
  <label>Police Timer :</label>
  <select id="timerFont" onchange="sendStyles()">
    <option>Luckiest Guy</option><option>Arial</option><option>Impact</option>
  </select><br><br>
  <label>Fond Couleur :</label> <input type="color" id="bgColor" value="#000000"><br>
  <label>Opacité Fond (0-100) :</label> <input type="number" id="bgOpacity" value="45" style="width:50px;"><br>
  <label>Arrondi :</label> <input type="number" id="bgRadius" value="30" style="width:50px;"><br>
  <button onclick="sendStyles()">Appliquer le Style de Fond</button>
</div>

<div class="panel">
  <h3>Image de fond</h3>
  <input type="file" id="imageUpload" accept="image/*" onchange="sendImage(event)">
</div>

<script>
const socket = io('http://localhost:3000');
let base64Image = "";

function sendAction(action) {
  const data = { action: action };
  if(action === 'set_time') {
    data.h = +startHours.value || 0;
    data.m = +startMinutes.value || 0;
    data.s = +startSeconds.value || 0;
  } else if(action === 'update_info' || action === 'add_coins' || action === 'remove_coins') {
    data.coinValue = +coinValue.value || 1;
    data.coins = +coins.value || 0;
  }
  socket.emit('panel_action', data);
}

function sendStyles() {
  const color = bgColor.value;
  const opacity = bgOpacity.value / 100;
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);

  socket.emit('panel_styles', {
    timerColor: timerColor.value,
    timerEffect: timerEffect.value,
    timerFont: timerFont.value,
    bgBoxColor: `rgba(${r},${g},${b},${opacity})`,
    bgRadius: bgRadius.value,
    bgImage: base64Image
  });
}

function sendImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    base64Image = ev.target.result;
    sendStyles();
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
